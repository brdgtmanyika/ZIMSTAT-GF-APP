<!DOCTYPE html>
<html lang="en">
<head>
    <title>ZIMSTAT - Analytical & Geofencing System Login</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #07162c 0%, #0b3d91 50%, #0c2540 100%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.15);
            --input-focus-border: #ffcc00;
            --btn-bg: #ffcc00;
            --btn-text: #07162c;
            --btn-hover: #e6b800;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            --details-bg: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f4f6fb 0%, #e1e7f0 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(11, 61, 145, 0.15);
            --text-color: #07162c;
            --text-muted: #556080;
            --input-bg: #ffffff;
            --input-border: rgba(11, 61, 145, 0.2);
            --input-focus-border: #0b3d91;
            --btn-bg: #0b3d91;
            --btn-text: #ffffff;
            --btn-hover: #072c6c;
            --shadow: 0 20px 40px rgba(11, 61, 145, 0.1);
            --details-bg: rgba(11, 61, 145, 0.05);
        }

        * {
            box-sizing: border-box;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient floating shapes */
        .ambient-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: #ffcc00;
            top: -50px;
            right: -50px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #0b3d91;
            bottom: -100px;
            left: -100px;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            cursor: pointer;
            font-size: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 20;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 40px 30px;
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo-area {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-area img {
            width: 90px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .logo-area h2 {
            margin: 0;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 1.5px;
            color: var(--text-color);
            text-transform: uppercase;
        }

        .logo-area p {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 15px;
            font-family: inherit;
            outline: none;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            opacity: 0.8;
        }

        .form-group input:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
        }

        button.btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(255, 204, 0, 0.2);
        }

        button.btn-submit:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 204, 0, 0.3);
        }

        button.btn-submit:active {
            transform: translateY(0);
        }

        .credentials-accordion {
            margin-top: 30px;
            border-top: 1px solid var(--card-border);
            padding-top: 20px;
        }

        details {
            background: var(--details-bg);
            border-radius: 12px;
            padding: 10px 15px;
            text-align: left;
            border: 1px solid var(--card-border);
        }

        details summary {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
        }

        details summary::-webkit-details-marker {
            display: none;
        }

        details summary::after {
            content: "\f078";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 10px;
            transition: transform 0.2s;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        .credentials-grid {
            margin-top: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            border-top: 1px solid var(--card-border);
            padding-top: 10px;
        }

        .cred-card {
            background: rgba(0, 0, 0, 0.1);
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
        }

        .cred-title {
            font-weight: 700;
            color: var(--input-focus-border);
            margin-bottom: 4px;
        }

        .cred-item {
            color: var(--text-muted);
            font-family: monospace;
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- Ambient blur spheres -->
    <div class="ambient-shape shape-1"></div>
    <div class="ambient-shape shape-2"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <img src="/static/images/logo.png" alt="ZIMSTAT Logo" onerror="this.src='https://via.placeholder.com/100?text=ZIMSTAT'">
                <h2>ZIMSTAT</h2>
                <p>Geofencing & Analytics Portal</p>
            </div>

            <form method="POST">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit">
                    <span>SIGN IN</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="credentials-accordion">
                <details>
                    <summary>
                        <span>Demo Account Access</span>
                        <i class="fas fa-info-circle" style="color: var(--input-focus-border);"></i>
                    </summary>
                    <div class="credentials-grid">
                        <div class="cred-card">
                            <div class="cred-title"><i class="fas fa-user-shield"></i> Admin</div>
                            <div class="cred-item">User: admin</div>
                            <div class="cred-item">Pass: admin123</div>
                        </div>
                        <div class="cred-card">
                            <div class="cred-title"><i class="fas fa-map-marker-alt"></i> Enumerator</div>
                            <div class="cred-item">User: enumerator</div>
                            <div class="cred-item">Pass: enum123</div>
                        </div>
                    </div>
                </details>
            </div>

            <div class="footer">
                © <span id="year"></span> ZIMSTAT GIS. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        // Set year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Light/Dark Theme Logic
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const currentTheme = localStorage.getItem('theme') || 'dark';

        if (currentTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeIcon.className = 'fas fa-sun';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.className = 'fas fa-moon';
        }

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
